<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIC · TAC · TOE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ─── All original styles ─── */
  :root {
    --bg: #080c14;
    --panel: #0d1424;
    --border: #1a2a4a;
    --x-color: #ff3f6e;
    --x-glow: rgba(255,63,110,0.5);
    --o-color: #00e5ff;
    --o-glow: rgba(0,229,255,0.5);
    --grid: #1e3a5f;
    --win-color: #ffd700;
    --win-glow: rgba(255,215,0,0.6);
    --dim: #4a6a8a;
    --bright: #e0f0ff;
    --cell: min(28vw, 120px);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    color: var(--bright);
    padding: 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: -100px;
    background-image: linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: bgs 25s linear infinite;
    pointer-events: none;
  }
  @keyframes bgs { to { transform: translate(50px,50px); } }

  .wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 420px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(20px, 6vw, 34px);
    letter-spacing: 0.25em;
    text-align: center;
    text-shadow: 0 0 24px var(--o-glow);
  }
  h1 em { color: var(--o-color); font-style: normal; }

  .mode-row { display: flex; border: 1px solid var(--border); overflow: hidden; }
  .mode-btn {
    font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
    padding: 9px 20px; background: transparent; border: none;
    color: var(--dim); cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.on { background: var(--o-color); color: #000; }
  .mode-btn:hover:not(.on) { color: var(--bright); }

  .scores { display: flex; align-items: stretch; gap: 8px; width: 100%; }
  .sbox {
    flex: 1; background: var(--panel); border: 1px solid var(--border);
    padding: 10px 6px; text-align: center; transition: border-color 0.3s, box-shadow 0.3s;
  }
  .sbox.lit-x { border-color: var(--x-color); box-shadow: 0 0 12px var(--x-glow); }
  .sbox.lit-o { border-color: var(--o-color); box-shadow: 0 0 12px var(--o-glow); }
  .slbl { font-size: 9px; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 4px; }
  .slbl.cx { color: var(--x-color); }
  .slbl.co { color: var(--o-color); }
  .snum { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 700; line-height: 1; }
  .ssep { display: flex; align-items: center; font-family: 'Orbitron', monospace; font-size: 16px; color: var(--border); flex-shrink: 0; }

  .status {
    font-size: 11px; letter-spacing: 0.12em; min-height: 18px;
    text-align: center; transition: color 0.3s; color: var(--dim);
    padding: 0 8px;
  }
  .status.sx { color: var(--x-color); }
  .status.so { color: var(--o-color); }
  .status.sw { color: var(--win-color); text-shadow: 0 0 10px var(--win-glow); animation: blink 0.6s ease-in-out infinite alternate; }
  .status.sd { color: var(--bright); }
  .status.sy { color: var(--o-color); }
  @keyframes blink { from { opacity:0.6; } to { opacity:1; } }

  .board-wrap { position: relative; }

  table.board {
    border-collapse: collapse;
    table-layout: fixed;
    line-height: 0;
  }

  table.board td {
    width: var(--cell);
    height: var(--cell);
    text-align: center;
    vertical-align: middle;
    cursor: pointer;
    background: var(--bg);
    border: 3px solid var(--grid);
    transition: background 0.15s;
    line-height: normal;
  }

  table.board tr:first-child td { border-top: none; }
  table.board tr:last-child  td { border-bottom: none; }
  table.board td:first-child    { border-left: none; }
  table.board td:last-child     { border-right: none; }

  table.board td:hover:not(.filled) { background: rgba(255,255,255,0.03); }

  .mark {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: calc(var(--cell) * 0.42);
    display: block;
    opacity: 0;
    transform: scale(0.2) rotate(-15deg);
    transition: opacity 0.22s cubic-bezier(0.34,1.56,0.64,1), transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    user-select: none;
  }
  td.filled .mark { opacity: 1; transform: scale(1) rotate(0deg); }
  td.cx .mark { color: var(--x-color); text-shadow: 0 0 18px var(--x-glow), 0 0 36px var(--x-glow); }
  td.co .mark { color: var(--o-color); text-shadow: 0 0 18px var(--o-glow), 0 0 36px var(--o-glow); }
  td.won .mark { animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }

  .win-line {
    position: absolute;
    height: 4px;
    background: var(--win-color);
    box-shadow: 0 0 14px var(--win-glow), 0 0 30px var(--win-glow);
    border-radius: 2px;
    transform-origin: left center;
    animation: draw 0.35s ease-out both;
    z-index: 20;
    pointer-events: none;
  }
  @keyframes draw { from { transform: scaleX(0); opacity: 0; } to { transform: scaleX(1); opacity: 1; } }

  .btn-row { display: flex; gap: 10px; width: 100%; }
  .btn {
    flex: 1;
    font-family: 'Orbitron', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    color: var(--dim); background: var(--panel); border: 1px solid var(--border);
    padding: 12px 8px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .btn:hover { color: var(--bright); border-color: var(--o-color); box-shadow: 0 0 10px var(--o-glow); }
  .btn:active { transform: scale(0.97); }

  .ptcl {
    position: fixed; width: 5px; height: 5px; border-radius: 50%;
    pointer-events: none; z-index: 500;
    animation: fly var(--t) ease-out forwards;
  }
  @keyframes fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)} }

  .c { position: fixed; width: 36px; height: 36px; opacity: 0.25; }
  .c.tl { top:16px; left:16px;  border-top:2px solid var(--o-color); border-left:2px solid var(--o-color); }
  .c.tr { top:16px; right:16px; border-top:2px solid var(--o-color); border-right:2px solid var(--o-color); }
  .c.bl { bottom:16px; left:16px;  border-bottom:2px solid var(--o-color); border-left:2px solid var(--o-color); }
  .c.br { bottom:16px; right:16px; border-bottom:2px solid var(--o-color); border-right:2px solid var(--o-color); }

  /* Online menus & prompts */
  #online-menu, #code-prompt {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }
  #online-menu.on, #code-prompt.on { display: flex; }

  .menu-card {
    background: rgba(20,14,8,.95);
    border: 1px solid var(--border);
    padding: 30px;
    text-align: center;
    max-width: 320px;
    width: 90%;
  }

  .menu-btn {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: transparent;
    border: 1px solid var(--o-color);
    color: var(--o-color);
    padding: 12px 24px;
    cursor: pointer;
    transition: 0.2s;
    margin: 8px 5px;
    text-transform: uppercase;
    width: 100%;
  }
  .menu-btn:active { background: rgba(0,229,255,0.18); }

  .menu-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--bright);
    padding: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    letter-spacing: 0.1em;
    text-align: center;
    width: 100%;
    outline: none;
    autocapitalize: none;
    autocomplete: off;
  }

  #status-msg {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: var(--o-color);
    padding: 10px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    z-index: 150;
    display: none;
    letter-spacing: 0.12em;
  }

  #cancel-waiting {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 10px 30px;
    cursor: pointer;
    text-transform: uppercase;
  }
  #cancel-waiting:active { color: var(--o-color); border-color: var(--o-color); }
</style>
</head>
<body>

<div class="c tl"></div><div class="c tr"></div>
<div class="c bl"></div><div class="c br"></div>

<div class="wrap">
  <h1>TIC<em>·</em>TAC<em>·</em>TOE</h1>

  <div class="mode-row">
    <button class="mode-btn on" id="pvp-btn" onclick="setMode('pvp')">2 PLAYERS</button>
    <button class="mode-btn"   id="cpu-btn"  onclick="setMode('cpu')">VS CPU</button>
    <button class="mode-btn"   id="online-btn" onclick="setMode('online')">ONLINE</button>
  </div>

  <div class="scores">
    <div class="sbox lit-x" id="box-x">
      <div class="slbl cx" id="lbl-x">PLAYER X</div>
      <div class="snum" id="num-x">0</div>
    </div>
    <div class="ssep">:</div>
    <div class="sbox" id="box-d">
      <div class="slbl">DRAWS</div>
      <div class="snum" id="num-d">0</div>
    </div>
    <div class="ssep">:</div>
    <div class="sbox" id="box-o">
      <div class="slbl co" id="lbl-o">PLAYER O</div>
      <div class="snum" id="num-o">0</div>
    </div>
  </div>

  <div class="status sx" id="status">PLAYER X — YOUR MOVE</div>

  <div class="board-wrap" id="board-wrap">
    <table class="board" id="board">
      <tr>
        <td onclick="tap(0)"><span class="mark"></span></td>
        <td onclick="tap(1)"><span class="mark"></span></td>
        <td onclick="tap(2)"><span class="mark"></span></td>
      </tr>
      <tr>
        <td onclick="tap(3)"><span class="mark"></span></td>
        <td onclick="tap(4)"><span class="mark"></span></td>
        <td onclick="tap(5)"><span class="mark"></span></td>
      </tr>
      <tr>
        <td onclick="tap(6)"><span class="mark"></span></td>
        <td onclick="tap(7)"><span class="mark"></span></td>
        <td onclick="tap(8)"><span class="mark"></span></td>
      </tr>
    </table>
  </div>

  <div class="btn-row">
    <button class="btn" id="newgame-btn" onclick="newGame()">NEW GAME</button>
    <button class="btn" onclick="resetAll()">RESET SCORES</button>
  </div>
</div>

<!-- Online sub-menus -->
<div id="online-menu">
  <div id="online-main" class="menu-card">
    <h2 style="color:var(--o-color); margin-bottom:20px;">ONLINE PLAY</h2>
    <button class="menu-btn" onclick="showPublicOptions()">PUBLIC</button>
    <button class="menu-btn" onclick="showPrivateOptions()">PRIVATE</button>
    <button class="menu-btn" onclick="hideOnlineMenu()">BACK</button>
  </div>
  <div id="online-public" class="menu-card" style="display:none;">
    <h2 style="color:var(--o-color); margin-bottom:20px;">PUBLIC GAME</h2>
    <button class="menu-btn" onclick="createRoom('public')">CREATE ROOM</button>
    <button class="menu-btn" onclick="joinRoom('public')">JOIN ROOM</button>
    <button class="menu-btn" onclick="backToOnlineMain()">BACK</button>
  </div>
  <div id="online-private" class="menu-card" style="display:none;">
    <h2 style="color:var(--o-color); margin-bottom:20px;">PRIVATE GAME</h2>
    <button class="menu-btn" onclick="showCodePrompt('create')">CREATE ROOM</button>
    <button class="menu-btn" onclick="showCodePrompt('join')">JOIN ROOM</button>
    <button class="menu-btn" onclick="backToOnlineMain()">BACK</button>
  </div>
</div>

<!-- Code input -->
<div id="code-prompt">
  <div class="menu-card">
    <h2 id="code-prompt-title" style="color:var(--o-color); margin-bottom:16px;"></h2>
    <input type="text" id="code-input" class="menu-input" maxlength="20" placeholder="CODE" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false">
    <div style="margin-top:16px;">
      <button class="menu-btn" onclick="submitCode()">OK</button>
      <button class="menu-btn" onclick="hideCodePrompt()">CANCEL</button>
    </div>
  </div>
</div>

<!-- Status message -->
<div id="status-msg"></div>

<!-- Cancel waiting button -->
<button id="cancel-waiting" onclick="cancelWaiting()">CANCEL</button>

<script>
const WS_URL = 'wss://anichan-game-server.onrender.com';

const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells, state, turn, over, mode = 'pvp';
let starter = 'X';
const scBank = { pvp: {X:0,O:0,D:0}, cpu: {X:0,O:0,D:0}, online: {X:0,O:0,D:0} };
let sc = scBank.pvp;

// Multiplayer state
let ws = null;
let mySymbol = null;
let waitingTimer = null;
let waitingMode = null;          // 'create' or 'join'
let waitingSubMenu = null;       // 'public' or 'private'
let retryCount = 0;
const MAX_RETRIES = 5;
let retryTimer = null;

let autoTimer = null, countTimer = null;

function clearTimers() {
  clearTimeout(autoTimer);
  clearInterval(countTimer);
  autoTimer = null; countTimer = null;
}

function init() {
  clearTimers();
  cells = Array.from(document.querySelectorAll('table.board td'));
  state = Array(9).fill('');
  turn = starter;
  over = false;
  cells.forEach(c => {
    c.className = '';
    c.querySelector('.mark').textContent = '';
  });
  // Clear any leftover win lines
  document.querySelectorAll('.win-line').forEach(e => e.remove());

  if (mode !== 'online') {
    const startLbl = mode === 'cpu' && starter === 'O' ? 'CPU O — THINKING...' : 'PLAYER ' + starter + ' — YOUR MOVE';
    setStatus(startLbl, starter === 'X' ? 'sx' : 'so');
  }
  highlight();
  if (mode === 'cpu' && starter === 'O') setTimeout(cpuGo, 600);
}

function startAutoReset(baseMsg, cls) {
  let secs = 5;
  setStatus(baseMsg + '  ·  NEW GAME IN ' + secs + 's', cls);
  countTimer = setInterval(() => {
    secs--;
    if (secs > 0) {
      setStatus(baseMsg + '  ·  NEW GAME IN ' + secs + 's', cls);
    } else {
      clearInterval(countTimer);
    }
  }, 1000);
  autoTimer = setTimeout(() => {
    clearInterval(countTimer);
    newGame();
  }, 5000);
}

function tap(i) {
  if (over || state[i]) return;
  if (mode === 'cpu' && turn === 'O') return;
  if (mode === 'online') {
    if (turn !== mySymbol) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'move', game: 'tic-tac-toe', data: { index: i } }));
    }
    place(i);
    return;
  }
  place(i);
  if (mode === 'cpu' && !over) setTimeout(cpuGo, 420);
}

function place(i) {
  if (state[i] || over) return;
  state[i] = turn;
  const td = cells[i];
  td.classList.add('filled', turn === 'X' ? 'cx' : 'co');
  td.querySelector('.mark').textContent = turn;
  burst(td);

  const w = winner();
  if (w) {
    over = true; sc[turn]++; updateSc(); starter = (starter === 'X' ? 'O' : 'X');
    w.forEach(i => cells[i].classList.add('won'));
    drawWin(w);
    const who = mode === 'cpu' && turn === 'O' ? 'CPU' : (mode === 'online' ? (turn === mySymbol ? 'YOU' : 'OPPONENT') : 'PLAYER ' + turn);
    startAutoReset(who + ' WINS!', 'sw');
  } else if (state.every(Boolean)) {
    over = true; sc.D++; updateSc(); starter = (starter === 'X' ? 'O' : 'X');
    startAutoReset('DRAW — NO WINNER', 'sd');
  } else {
    turn = turn === 'X' ? 'O' : 'X';
    const lbl = mode === 'cpu' && turn === 'O' ? 'CPU O — THINKING...' : (mode === 'online' ? (turn === mySymbol ? 'YOUR MOVE' : 'OPPONENT\'S MOVE') : 'PLAYER ' + turn + ' — YOUR MOVE');
    setStatus(lbl, turn === 'X' ? 'sx' : 'so');
    highlight();
  }
}

function winner() {
  for (const c of WINS) if (c.every(i => state[i] === turn)) return c;
  return null;
}

function cpuGo() { place(bestMove()); }

function bestMove() {
  for (let i=0;i<9;i++) if (!state[i]) { state[i]='O'; if(canWin('O')){state[i]='';return i;} state[i]=''; }
  for (let i=0;i<9;i++) if (!state[i]) { state[i]='X'; if(canWin('X')){state[i]='';return i;} state[i]=''; }
  if (!state[4]) return 4;
  const c=[0,2,6,8].filter(i=>!state[i]);
  if (c.length) return c[0|Math.random()*c.length];
  const e=state.map((v,i)=>v?-1:i).filter(v=>v>=0);
  return e[0|Math.random()*e.length];
}

function canWin(p) { return WINS.some(w => w.every(i => state[i]===p)); }

// ─── PERFECT win line drawing ───
function drawWin(combo) {
  // Remove any existing win lines first
  document.querySelectorAll('.win-line').forEach(e => e.remove());

  const wrap = document.getElementById('board-wrap');
  const wr = wrap.getBoundingClientRect();
  const a = cells[combo[0]].getBoundingClientRect();
  const b = cells[combo[2]].getBoundingClientRect();

  // Center of the first winning cell
  const x1 = a.left + a.width/2 - wr.left;
  const y1 = a.top + a.height/2 - wr.top;
  // Center of the last winning cell
  const x2 = b.left + b.width/2 - wr.left;
  const y2 = b.top + b.height/2 - wr.top;

  const len = Math.hypot(x2 - x1, y2 - y1);
  const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;

  const ln = document.createElement('div');
  ln.className = 'win-line';
  ln.style.cssText = `
    width: ${len}px;
    left: ${x1}px;
    top: ${y1 - 2}px;        /* minus half the line height to vertically centre */
    transform: rotate(${ang}deg);
  `;
  wrap.appendChild(ln);
}

function highlight() {
  document.getElementById('box-x').className = 'sbox' + (turn==='X'?' lit-x':'');
  document.getElementById('box-o').className = 'sbox' + (turn==='O'?' lit-o':'');
}

function setStatus(txt,cls) {
  const e=document.getElementById('status');
  e.textContent=txt; e.className='status '+cls;
}

function updateSc() {
  document.getElementById('num-x').textContent=sc.X;
  document.getElementById('num-o').textContent=sc.O;
  document.getElementById('num-d').textContent=sc.D;
}

// ──────────────────── Online UI functions ────────────────────
function showOnlineMenu() {
  document.getElementById('online-menu').classList.add('on');
  document.getElementById('online-main').style.display = '';
  document.getElementById('online-public').style.display = 'none';
  document.getElementById('online-private').style.display = 'none';
}

function hideOnlineMenu() {
  document.getElementById('online-menu').classList.remove('on');
  // Return to local pvp mode
  setMode('pvp');
}

function showPublicOptions() {
  document.getElementById('online-main').style.display = 'none';
  document.getElementById('online-public').style.display = '';
  document.getElementById('online-private').style.display = 'none';
}

function showPrivateOptions() {
  document.getElementById('online-main').style.display = 'none';
  document.getElementById('online-public').style.display = 'none';
  document.getElementById('online-private').style.display = '';
}

function backToOnlineMain() {
  document.getElementById('online-main').style.display = '';
  document.getElementById('online-public').style.display = 'none';
  document.getElementById('online-private').style.display = 'none';
}

let pendingAction = null;

function showCodePrompt(action) {
  pendingAction = action;
  document.getElementById('code-prompt').classList.add('on');
  document.getElementById('online-menu').classList.remove('on');
  document.getElementById('code-input').value = '';
  document.getElementById('code-prompt-title').textContent = action === 'create' ? 'SET A ROOM CODE' : 'ENTER ROOM CODE';
  setTimeout(() => document.getElementById('code-input').focus(), 100);
}

function hideCodePrompt() {
  document.getElementById('code-prompt').classList.remove('on');
  document.getElementById('online-menu').classList.add('on');
}

function submitCode() {
  const code = document.getElementById('code-input').value.trim();
  if (!/^[A-Za-z0-9]+$/.test(code)) {
    showStatus('Only letters and numbers allowed', 2000);
    return;
  }
  hideCodePrompt();
  if (pendingAction === 'create') {
    waitingSubMenu = 'private';
    showWaitingScreen('WAITING FOR OPPONENT...');
    sendCreateRoom('private', code);
  } else {
    joinRoom('private', code);
  }
}

function createRoom(type) {
  waitingSubMenu = type;
  showWaitingScreen('WAITING FOR OPPONENT...');
  sendCreateRoom(type, type === 'public' ? null : undefined); // public has no code
}

function joinRoom(type, code) {
  waitingSubMenu = type;
  showWaitingScreen('SEARCHING FOR GAME...');
  sendJoinRoom(type, code);
}

function showWaitingScreen(msg) {
  document.getElementById('online-menu').classList.remove('on');
  document.getElementById('code-prompt').classList.remove('on');
  document.getElementById('cancel-waiting').style.display = 'block';
  showStatus(msg, 0);
  waitingMode = msg.includes('WAITING') ? 'create' : 'join';
}

function cancelWaiting() {
  clearTimeout(retryTimer);
  clearWaitingTimer();
  waitingMode = null;
  document.getElementById('cancel-waiting').style.display = 'none';
  hideStatus();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'leave_room', game: 'tic-tac-toe' }));
  }
  disconnectOnline();
  // Return to appropriate sub-menu
  if (waitingSubMenu === 'public') {
    showPublicOptions();
    document.getElementById('online-menu').classList.add('on');
  } else if (waitingSubMenu === 'private') {
    showPrivateOptions();
    document.getElementById('online-menu').classList.add('on');
  } else {
    showOnlineMenu();
  }
}

function clearWaitingTimer() {
  if (waitingTimer) { clearTimeout(waitingTimer); waitingTimer = null; }
}

function disconnectOnline() {
  clearTimeout(retryTimer);
  clearWaitingTimer();
  if (ws) { ws.onclose = null; ws.close(); ws = null; }
  mySymbol = null;
  retryCount = 0;
}

// ──────────────────── WebSocket connection with retry ────────────────────
function sendCreateRoom(type, code) {
  retryCount = 0;
  showStatus('CONNECTING...', 0);
  disconnectOnline();
  attemptCreateRoom(type, code);
}

function attemptCreateRoom(type, code) {
  if (retryCount >= MAX_RETRIES) {
    hideStatus();
    showStatus('COULD NOT CONNECT', 2000);
    cancelWaiting();
    return;
  }
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    let msg;
    if (type === 'public') {
      msg = JSON.stringify({ type: 'create_public', game: 'tic-tac-toe' });
    } else {
      msg = JSON.stringify({ type: 'create_private', game: 'tic-tac-toe', code });
    }
    ws.send(msg);
    showStatus('WAITING FOR OPPONENT...', 0);
    retryCount = 0;
    clearWaitingTimer();
    waitingTimer = setTimeout(() => {
      if (waitingMode === 'create') {
        cancelWaiting();
        showStatus('NO OPPONENT JOINED', 3000);
      }
    }, 600000); // 10 minutes
  };
  ws.onmessage = handleWSMessage;
  ws.onerror = () => {};
  ws.onclose = () => {
    if (waitingMode === 'create' && !mySymbol) {
      retryCount++;
      const delay = Math.min(2000 * retryCount, 10000);
      showStatus(`RETRYING IN ${Math.round(delay/1000)}s...`, 0);
      retryTimer = setTimeout(() => attemptCreateRoom(type, code), delay);
    }
  };
}

function sendJoinRoom(type, code) {
  retryCount = 0;
  showStatus('CONNECTING...', 0);
  disconnectOnline();
  attemptJoinRoom(type, code);
}

function attemptJoinRoom(type, code) {
  if (retryCount >= MAX_RETRIES) {
    hideStatus();
    showStatus('COULD NOT CONNECT', 2000);
    cancelWaiting();
    return;
  }
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    let msg;
    if (type === 'public') {
      msg = JSON.stringify({ type: 'join_public', game: 'tic-tac-toe' });
    } else {
      msg = JSON.stringify({ type: 'join_private', game: 'tic-tac-toe', code });
    }
    ws.send(msg);
    showStatus('SEARCHING FOR GAME...', 0);
    retryCount = 0;
    clearWaitingTimer();
    waitingTimer = setTimeout(() => {
      if (waitingMode === 'join') {
        cancelWaiting();
        if (type === 'private') showStatus('NO ROOM FOUND FOR THAT CODE', 3000);
        else showStatus('NO OPPONENT FOUND', 3000);
      }
    }, 600000);
  };
  ws.onmessage = handleWSMessage;
  ws.onerror = () => {};
  ws.onclose = () => {
    if (waitingMode === 'join' && !mySymbol) {
      retryCount++;
      const delay = Math.min(2000 * retryCount, 10000);
      showStatus(`RETRYING IN ${Math.round(delay/1000)}s...`, 0);
      retryTimer = setTimeout(() => attemptJoinRoom(type, code), delay);
    }
  };
}

function handleWSMessage(e) {
  const msg = JSON.parse(e.data);
  if (msg.type === 'room_created') return;
  if (msg.type === 'room_cancelled') {
    cancelWaiting();
    return;
  }
  if (msg.type === 'start') {
    clearTimeout(retryTimer);
    clearWaitingTimer();
    waitingMode = null;
    document.getElementById('cancel-waiting').style.display = 'none';
    mySymbol = msg.symbol;
    starter = 'X';
    turn = 'X';
    if (mySymbol === 'X') {
      document.getElementById('lbl-x').textContent = 'YOU (X)';
      document.getElementById('lbl-o').textContent = 'OPPONENT (O)';
    } else {
      document.getElementById('lbl-x').textContent = 'OPPONENT (X)';
      document.getElementById('lbl-o').textContent = 'YOU (O)';
    }
    updateSc();
    // Hide all online menus
    document.getElementById('online-menu').classList.remove('on');
    document.getElementById('code-prompt').classList.remove('on');
    setStatus(mySymbol === turn ? 'YOUR MOVE' : 'OPPONENT\'S MOVE', turn === 'X' ? 'sx' : 'so');
    highlight();
    hideStatus();
  } else if (msg.type === 'move') {
    const idx = msg.data.index;
    if (!state[idx] && !over) {
      turn = mySymbol === 'X' ? 'O' : 'X';
      place(idx);
    }
  } else if (msg.type === 'opponent_disconnected') {
    setStatus('OPPONENT DISCONNECTED', 'sd');
    over = true;
    disconnectOnline();
    setMode('pvp');
  } else if (msg.type === 'error') {
    showStatus(msg.message, 3000);
  }
}

// ──────────────────── Mode switching ────────────────────
function setMode(m) {
  if (mode === 'online' && m !== 'online') disconnectOnline();
  if (m === 'online') {
    starter = 'X';
    mode = 'online';
    sc = scBank.online;
    document.getElementById('pvp-btn').classList.remove('on');
    document.getElementById('cpu-btn').classList.remove('on');
    document.getElementById('online-btn').classList.add('on');
    document.getElementById('lbl-o').textContent = 'PLAYER O';
    updateSc();
    newGame();   // reset board
    showOnlineMenu();  // show menu instead of auto-connecting
  } else {
    starter = 'X';
    mode = m;
    sc = scBank[m];
    document.getElementById('pvp-btn').classList.toggle('on', m==='pvp');
    document.getElementById('cpu-btn').classList.toggle('on', m==='cpu');
    document.getElementById('online-btn').classList.remove('on');
    document.getElementById('lbl-o').textContent = m==='cpu' ? 'CPU O' : 'PLAYER O';
    document.getElementById('lbl-x').textContent = 'PLAYER X';
    updateSc();
    newGame();
  }
}

// ─── Fixed newGame: also clears win lines ───
function newGame() {
  clearTimers();
  // Remove all win lines
  document.querySelectorAll('.win-line').forEach(e => e.remove());

  state = Array(9).fill('');
  over = false;
  cells.forEach(c => {
    c.className = '';
    c.querySelector('.mark').textContent = '';
  });

  if (mode === 'online') {
    // Show online menu again (or waiting screen if already in a game)
    if (!mySymbol) {
      showOnlineMenu();
    }
  } else {
    init();
  }
}

function resetAll() {
  starter = 'X';
  scBank[mode] = {X:0,O:0,D:0};
  sc = scBank[mode];
  updateSc();
  if (mode === 'online') {
    disconnectOnline();
    newGame();
    showOnlineMenu();
  } else {
    newGame();
  }
}

function showStatus(msg, duration) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.display = 'block';
  if (duration) setTimeout(() => el.style.display = 'none', duration);
}

function hideStatus() {
  document.getElementById('status-msg').style.display = 'none';
}

// Particle burst (unchanged)
function burst(td) {
  const r=td.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const col=turn==='X'?'#ff3f6e':'#00e5ff';
  for (let i=0;i<10;i++) {
    const p=document.createElement('div');
    p.className='ptcl';
    const a=(i/10)*360+Math.random()*36, d=35+Math.random()*45;
    p.style.cssText='left:'+(cx-2.5)+'px;top:'+(cy-2.5)+'px;background:'+col+';box-shadow:0 0 5px '+col+';--dx:'+(Math.cos(a*Math.PI/180)*d)+'px;--dy:'+(Math.sin(a*Math.PI/180)*d)+'px;--t:'+(0.5+Math.random()*0.35)+'s';
    document.body.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

// Initialise
init();
</script>
